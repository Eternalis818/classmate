<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时光纪念册 · 加载中…</title>
  <style>
    /* ═══ Default tokens (starlight-admission) ═══ */
    :root {
      --bg: #F5F0E1; --surface: #FFFDF7; --surface-warm: #F8F0DC; --surface-cool: #EDE6D0;
      --fg: #2C1810; --fg-2: #5C3D2E; --muted: #8B7355; --meta: #A08A6C;
      --border: #D4B896; --border-soft: #E8DCC8;
      --accent: #C8102E; --accent-coral: #E8395B; --accent-mint: #D4AF37;
      --accent-on: #fff; --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
      --fg-soft: color-mix(in oklch, var(--fg) 6%, transparent);
      --success: #2e9d57; --warn: #ffb020; --danger: #e5484d;
      --hero-gradient: linear-gradient(135deg, #F5F0E1 0%, #F8E8C8 40%, #EDE0C0 100%);
      --envelope-gradient: linear-gradient(135deg, #F8F0DC, #FFEFD5, #FFF8E7);
      --particle-colors: #D4AF37, #C8102E, #F5D060, #8B6914;
      --font-display: 'Noto Serif SC','STSong','SimSun',serif;
      --font-body: 'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      --font-mono: 'Fira Code','JetBrains Mono',ui-monospace,Menlo,monospace;
      --text-xs: 12px; --text-sm: 14px; --text-base: 16px; --text-lg: 18px;
      --text-xl: 24px; --text-2xl: 36px; --text-3xl: 54px; --text-4xl: 76px;
      --leading-body: 1.65; --leading-tight: 1.1;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px;
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 9999px;
      --elev-raised: 0 8px 30px rgba(29,24,54,0.1);
      --elev-float: 0 16px 48px rgba(29,24,54,0.15);
      --motion-fast: 150ms; --motion-base: 240ms; --motion-slow: 400ms;
      --ease-standard: cubic-bezier(0.2,0,0,1); --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
      --container-max: 1100px; --gutter: 32px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:var(--text-base);line-height:var(--leading-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}
    img,svg{display:block;max-width:100%}a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:none;background:none}
    p{text-wrap:pretty}h1,h2,h3,h4{text-wrap:balance}
    .container{max-width:var(--container-max);margin-inline:auto;padding-inline:var(--gutter)}
    .section{padding-block:clamp(48px,8vw,96px);position:relative}
    h1{font-size:clamp(36px,6vw,64px);line-height:var(--leading-tight);letter-spacing:-0.02em;font-weight:700}
    h2{font-size:clamp(28px,4vw,40px);line-height:var(--leading-tight);letter-spacing:-0.015em;font-weight:700}
    h3{font-size:var(--text-xl);font-weight:600;line-height:1.3}
    .eyebrow{font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:var(--space-4);display:inline-block}
    .meta{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--muted)}
    .lead{font-size:var(--text-lg);line-height:1.6;color:var(--muted);max-width:60ch}
    .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-pill);font-size:var(--text-sm);font-weight:500}
    .pill-purple{background:color-mix(in oklch,var(--accent) 14%,transparent);color:var(--accent)}
    .pill-coral{background:color-mix(in oklch,var(--accent-coral) 14%,transparent);color:var(--accent-coral)}
    .pill-mint{background:color-mix(in oklch,var(--accent-mint) 16%,transparent);color:#059669}
    .tag{display:inline-flex;align-items:center;padding:4px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-pill);font-size:var(--text-sm);transition:all var(--motion-base) var(--ease-standard);cursor:pointer}
    .tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-8);transition:transform var(--motion-base) var(--ease-standard),box-shadow var(--motion-base) var(--ease-standard)}
    .card:hover{transform:translateY(-4px);box-shadow:var(--elev-float)}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-8)}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-8)}
    @media(max-width:920px){.grid-2,.grid-3{grid-template-columns:1fr}}

    .ph-img{background:linear-gradient(135deg,var(--accent-soft),var(--fg-soft)),var(--surface);border:2px dashed var(--border);border-radius:var(--radius-lg);display:grid;place-items:center;color:var(--muted);font-size:var(--text-sm);overflow:hidden;position:relative}
    .ph-img::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,color-mix(in oklch,var(--accent) 6%,transparent),transparent)}
    .ph-img.portrait{aspect-ratio:3/4}.ph-img.square{aspect-ratio:1/1}.ph-img.wide{aspect-ratio:16/9}

    .photo-frame{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);display:block}
    .photo-frame>img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
    .photo-frame.is-square{aspect-ratio:1/1}
    .photo-frame.is-circle{aspect-ratio:1/1;border-radius:50%}
    .photo-frame.is-wide{aspect-ratio:16/9}
    .photo-frame .photo-fallback{position:absolute;inset:0;display:grid;place-items:center;padding:var(--space-3);text-align:center;color:var(--muted);font-size:var(--text-sm);background:linear-gradient(135deg,var(--accent-soft),var(--fg-soft)),var(--surface)}

    .reveal{opacity:0;transform:translateY(40px);transition:opacity 0.6s var(--ease-standard),transform 0.6s var(--ease-standard)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .reveal-delay-1{transition-delay:.1s}.reveal-delay-2{transition-delay:.2s}.reveal-delay-3{transition-delay:.3s}

    .divider{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0}

    /* Topnav */
    .topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:color-mix(in oklch,var(--bg) 88%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border-soft)}
    .topnav-inner{max-width:var(--container-max);margin-inline:auto;padding-inline:var(--gutter);display:flex;align-items:center;justify-content:space-between;height:56px}
    .topnav .logo{font-weight:700;font-size:var(--text-lg);letter-spacing:-0.01em}
    .topnav .logo-accent{color:var(--accent)}
    .topnav nav{display:flex;gap:var(--space-6)}
    .topnav nav a{font-size:var(--text-sm);color:var(--muted);transition:color var(--motion-fast)}
    .topnav nav a:hover{color:var(--accent)}
    .theme-switch-btn{
      padding:4px 12px!important;
      background:linear-gradient(135deg,#a78bfa,#ec4899);
      color:#fff!important;border-radius:999px;
      font-weight:600;
    }
    .theme-switch-btn:hover{transform:scale(1.05);color:#fff!important}
    @media(max-width:600px){.topnav nav{display:none}}

    /* Theme Switcher */
    .ts-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.55);
      display:grid;place-items:center;z-index:9999;padding:20px;
      animation:tsFade 0.2s ease;
    }
    @keyframes tsFade{from{opacity:0}to{opacity:1}}
    .ts-card{
      background:var(--surface);border-radius:16px;
      max-width:560px;width:100%;max-height:85vh;overflow:auto;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      animation:tsUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes tsUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .ts-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
    .ts-head h3{margin:0;font-size:18px}
    .ts-close{background:none;border:none;font-size:28px;cursor:pointer;color:var(--muted);line-height:1;width:32px;height:32px;border-radius:50%;transition:all 0.2s}
    .ts-close:hover{background:var(--border);color:var(--fg)}
    .ts-hint{font-size:13px;color:var(--muted);padding:0 24px;margin:14px 0 8px}
    .ts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 24px 20px}
    @media(max-width:480px){.ts-grid{grid-template-columns:repeat(2,1fr)}}
    .ts-item{
      padding:14px 8px;border:2px solid var(--border);border-radius:12px;
      text-align:center;cursor:pointer;transition:all 0.2s;
    }
    .ts-item:hover{border-color:var(--accent);transform:translateY(-2px)}
    .ts-item.selected{border-color:var(--accent);background:color-mix(in oklch,var(--accent) 8%,transparent)}
    .ts-item.has-preview-bg{background-size:cover;background-position:center}
    .ts-emoji{font-size:30px;margin-bottom:4px}
    .ts-name{font-size:13px;font-weight:600}
    .ts-type{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em}
    .ts-foot{
      padding:16px 24px;border-top:1px solid var(--border);
      display:flex;gap:10px;justify-content:space-between;
    }

    /* Theme Preview Modal */
    .tp-mask{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:20px}
    .tp-mask.open{display:flex}
    .tp-card{background:var(--bg,#1a1a1a);border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.5);color:#fff}
    .tp-hero{height:240px;background:var(--hero-gradient,linear-gradient(135deg,#444,#222));border-radius:20px 20px 0 0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .tp-hero::before{content:'';position:absolute;inset:0;background-image:var(--asset-hero-bg,none);background-size:cover;background-position:center;opacity:0;transition:opacity 0.3s}
    .tp-hero.has-asset-hero-bg::before{opacity:1}
    .tp-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.4) 100%)}
    .tp-hero-content{position:relative;z-index:1;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.4)}
    .tp-hero-emoji{font-size:56px;margin-bottom:8px}
    .tp-hero-name{font-size:24px;font-weight:700;letter-spacing:0.02em}
    .tp-hero-tagline{font-size:13px;opacity:0.85;margin-top:4px;font-family:var(--font-mono)}
    .tp-body{padding:24px 28px}
    .tp-section{margin-bottom:18px}
    .tp-section:last-child{margin-bottom:0}
    .tp-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.6;margin-bottom:8px;font-family:var(--font-mono)}
    .tp-swatches{display:flex;gap:8px}
    .tp-swatch{flex:1;height:48px;border-radius:10px;position:relative;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;font-family:var(--font-mono);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.1)}
    .tp-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .tp-info-cell{background:rgba(255,255,255,0.06);border-radius:10px;padding:10px 12px}
    .tp-info-cell .k{font-size:10px;opacity:0.6;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.05em}
    .tp-info-cell .v{font-size:13px;font-weight:500;margin-top:3px;word-break:break-all}
    .tp-ability{height:8px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden;margin-top:4px}
    .tp-ability-fill{height:100%;border-radius:4px;background:var(--accent,#fbbf24)}
    .tp-foot{padding:16px 28px 24px;display:flex;gap:12px;border-top:1px solid rgba(255,255,255,0.08)}
    .tp-foot button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:transform 0.15s}
    .tp-foot button:hover{transform:translateY(-1px)}
    .tp-foot .tp-cancel{background:rgba(255,255,255,0.08);color:#fff;border:none}
    .tp-foot .tp-choose{background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;border:none;box-shadow:0 4px 16px rgba(167,139,250,0.3)}
    .ts-btn{
      padding:8px 16px;border-radius:8px;border:1px solid var(--border);
      background:transparent;cursor:pointer;font-size:13px;font-weight:500;
      transition:all 0.2s;
    }
    .ts-btn:hover{background:var(--border)}
    .ts-btn.primary{background:var(--accent);color:var(--accent-on);border-color:var(--accent)}
    .ts-toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--ink,#1a1a1a);color:#fff;padding:12px 24px;
      border-radius:999px;font-size:14px;z-index:10000;
      opacity:0;transition:all 0.3s;
    }
    .ts-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Photo Upload UI */
    .gallery-upload-btn{
      margin-left:auto;display:inline-flex;align-items:center;gap:6px;
      padding:6px 16px;border-radius:var(--radius-pill);font-size:var(--text-sm);font-weight:500;
      background:linear-gradient(135deg,var(--accent),var(--accent-coral));
      color:#fff;border:none;cursor:pointer;transition:transform var(--motion-base) var(--ease-bounce),box-shadow var(--motion-base);
    }
    .gallery-upload-btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:var(--elev-raised)}
    .upload-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;z-index:9999;padding:20px;animation:tsFade .2s ease}
    .upload-card{background:var(--surface);border-radius:16px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:tsUp .3s cubic-bezier(0.34,1.56,0.64,1)}
    .upload-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border)}
    .upload-head h3{margin:0;font-size:17px}
    .upload-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
    .upload-field{display:flex;flex-direction:column;gap:6px}
    .upload-label{font-size:13px;font-weight:600;color:var(--fg-2)}
    .upload-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .upload-cat{padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:transparent;cursor:pointer;text-align:center;font-size:12px;font-weight:500;transition:all var(--motion-fast)}
    .upload-cat:hover{border-color:var(--accent)}
    .upload-cat.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
    .upload-cat-emoji{font-size:20px;display:block;margin-bottom:2px}
    .upload-file{padding:14px;border:2px dashed var(--border);border-radius:12px;text-align:center;cursor:pointer;transition:border-color var(--motion-fast);font-size:13px;color:var(--muted)}
    .upload-file:hover{border-color:var(--accent);color:var(--accent)}
    .upload-file input{display:none}
    .upload-file-preview{margin-top:8px;aspect-ratio:4/3;display:none;border-radius:8px;overflow:hidden}
    .upload-file-preview img{width:100%;height:100%;object-fit:cover;display:block}
    .upload-input{padding:10px 14px;border:1px solid var(--border);border-radius:10px;font:inherit;font-size:14px;outline:none;transition:border-color var(--motion-fast);background:var(--bg)}
    .upload-input:focus{border-color:var(--accent)}
    .upload-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    .upload-btn{padding:9px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:14px;font-weight:500;transition:all var(--motion-fast)}
    .upload-btn:hover{background:var(--border)}
    .upload-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .upload-btn.primary:hover{background:color-mix(in oklab,var(--accent),black 8%)}
    .upload-btn.primary:disabled{opacity:.5;cursor:not-allowed}
    .upload-status{font-size:12px;color:var(--muted);min-height:16px}
    .upload-status.error{color:var(--danger)}
    .upload-status.success{color:var(--success)}

    /* Messages UI (留言板) */
    .message-card{position:relative}
    .featured-badge{position:absolute;top:8px;right:8px;font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));animation:float 3s ease-in-out infinite}
    .message-actions{display:flex;gap:6px;flex-wrap:wrap}
    .msg-feat-btn,.msg-del-btn{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all var(--motion-fast)}
    .msg-feat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
    .msg-feat-btn.featured{border-color:#fbbf24;color:#b45309;background:#fef3c7}
    .msg-del-btn:hover{border-color:var(--danger);color:var(--danger)}
    body.msg-owner .message-actions{display:inline-flex}
    .msg-empty{padding:var(--space-12);text-align:center;color:var(--muted)}
    .msg-empty-icon{font-size:48px;margin-bottom:var(--space-3);opacity:.4}

    /* Section header */
    .section-header{text-align:center;margin-bottom:var(--space-12)}
    .section-header h2{margin-bottom:var(--space-3)}
    .section-header .lead{margin-inline:auto}
    .section-icon{width:48px;height:48px;margin:0 auto var(--space-4);display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);font-size:24px}
    .section-icon.purple{background:color-mix(in oklch,var(--accent) 12%,transparent)}
    .section-icon.coral{background:color-mix(in oklch,var(--accent-coral) 12%,transparent)}
    .section-icon.mint{background:color-mix(in oklch,var(--accent-mint) 14%,transparent)}
    .section-icon.gold{background:color-mix(in oklch,#ffb020 14%,transparent)}

    /* Hero */
    .hero-section{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--hero-gradient,var(--hero-gradient))}
    .hero-section::before{content:'';position:absolute;inset:0;background-image:var(--hero-bg,none);background-size:cover;background-position:center;z-index:0;opacity:0;transition:opacity 0.6s}
    .hero-section.has-hero-bg::before{opacity:1}
    .hero-section::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.5) 100%);z-index:1;pointer-events:none}
    .hero-particles{position:absolute;inset:0;pointer-events:none}
    .hero-content{text-align:center;position:relative;z-index:2;padding:var(--space-8)}
    .hero-badge{display:inline-block;padding:8px 24px;background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);border-radius:var(--radius-pill);font-size:var(--text-sm);color:var(--fg-2);margin-bottom:var(--space-8);border:1px solid color-mix(in oklch,var(--accent) 20%,transparent)}
    .hero-title{font-size:clamp(40px,8vw,80px);font-weight:800;line-height:1.08;margin-bottom:var(--space-6);background:var(--hero-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-subtitle{font-size:clamp(18px,3vw,26px);color:var(--fg-2);margin-bottom:var(--space-10);font-weight:400}
    .hero-float{animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
    .founder-crown{display:inline-block;padding:4px 14px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;border-radius:var(--radius-pill);font-size:var(--text-xs);font-weight:600;margin-bottom:var(--space-4);box-shadow:0 2px 8px rgba(245,158,11,0.3)}

    /* Class Photo */
    .class-photo-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-radius:var(--radius-pill);border:1px solid var(--border);font-size:var(--text-xs);color:var(--fg-2);cursor:pointer;transition:all var(--motion-base);box-shadow:0 2px 12px rgba(0,0,0,0.1)}
    .class-photo-badge:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(0,0,0,0.15)}
    .class-photo-badge img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #fff}
    .class-photo-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;padding:var(--space-6)}
    .class-photo-modal.open{display:flex}
    .class-photo-modal img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:var(--radius-lg);box-shadow:0 24px 80px rgba(0,0,0,0.5)}
    .class-photo-modal .close-btn{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.2);color:#fff;font-size:24px;display:grid;place-items:center;cursor:pointer;border:none;transition:background var(--motion-fast)}
    .class-photo-modal .close-btn:hover{background:rgba(255,255,255,0.3)}

    /* Profile */
    .profile-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--elev-raised);overflow:hidden;max-width:900px;margin:0 auto}
    .profile-banner{height:140px;background:var(--hero-gradient);position:relative}
    .profile-banner-pattern{position:absolute;inset:0;opacity:.2;background-image:radial-gradient(circle at 20% 50%,rgba(255,255,255,.4) 1px,transparent 1px),radial-gradient(circle at 80% 20%,rgba(255,255,255,.3) 1px,transparent 1px);background-size:30px 30px,40px 40px}
    .profile-body{display:flex;gap:var(--space-8);padding:0 var(--space-8) var(--space-8);margin-top:-50px;position:relative}
    .profile-avatar{width:120px;height:120px;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--elev-raised);flex-shrink:0;overflow:hidden;background:var(--surface)}
    .profile-info{flex:1;padding-top:56px}
    .profile-name{font-size:var(--text-2xl);font-weight:700;margin-bottom:var(--space-1)}
    .profile-nickname{font-size:var(--text-lg);color:var(--accent);margin-bottom:var(--space-4)}
    .profile-tags{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-6)}
    .profile-motto{font-style:italic;color:var(--fg-2);padding:var(--space-4) var(--space-6);background:var(--surface-warm);border-radius:var(--radius-md);border-left:3px solid var(--accent-coral);font-size:var(--text-base)}
    @media(max-width:700px){.profile-body{flex-direction:column;align-items:center;text-align:center}.profile-info{padding-top:var(--space-4)}.profile-tags{justify-content:center}}

    /* Gallery / Carousel */
    .gallery-tabs{display:flex;justify-content:center;gap:var(--space-2);margin-bottom:var(--space-8);flex-wrap:wrap}
    .gallery-tab{padding:6px 18px;border-radius:var(--radius-pill);font-size:var(--text-sm);font-weight:500;color:var(--muted);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all var(--motion-base) var(--ease-standard)}
    .gallery-tab:hover{border-color:var(--accent);color:var(--accent)}
    .gallery-tab.active{background:var(--accent);color:var(--accent-on);border-color:var(--accent)}
    .carousel-wrapper{position:relative;max-width:900px;margin:0 auto;border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);box-shadow:var(--elev-raised);border:1px solid var(--border)}
    .carousel-track{display:flex;transition:transform .5s var(--ease-standard)}
    .carousel-slide{min-width:100%;position:relative;overflow:hidden;aspect-ratio:4/3;background:var(--surface-warm)}
    .carousel-slide img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
    .carousel-slide .slide-label{position:absolute;bottom:0;left:0;right:0;padding:var(--space-4) var(--space-6);background:linear-gradient(transparent,rgba(0,0,0,.55));color:#fff;font-size:var(--text-sm);font-weight:500}
    .carousel-empty{width:100%;aspect-ratio:16/9;display:grid;place-items:center;color:var(--muted);font-size:var(--text-lg);background:linear-gradient(135deg,var(--surface-warm),var(--surface-cool))}
    .carousel-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.85);border:1px solid var(--border);font-size:24px;line-height:1;cursor:pointer;transition:all var(--motion-base);display:grid;place-items:center;color:var(--fg);backdrop-filter:blur(8px);z-index:2}
    .carousel-nav:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-50%) scale(1.08)}
    .carousel-nav.prev{left:12px}.carousel-nav.next{right:12px}
    .carousel-dots{display:flex;justify-content:center;gap:8px;padding:var(--space-4) 0}
    .carousel-dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:none;cursor:pointer;transition:all var(--motion-base)}
    .carousel-dot.active{background:var(--accent);transform:scale(1.3)}
    .carousel-dot:hover{background:var(--accent-coral)}
    @media(max-width:700px){.carousel-nav{width:36px;height:36px;font-size:18px}.carousel-nav.prev{left:6px}.carousel-nav.next{right:6px}}
    .timeline{position:relative;padding-left:40px;max-width:800px;margin:0 auto}
    .timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--accent-coral),var(--accent-mint));border-radius:2px}
    .timeline-item{position:relative;margin-bottom:var(--space-10);padding:var(--space-6);background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);transition:transform var(--motion-base) var(--ease-standard),box-shadow var(--motion-base);cursor:pointer}
    .timeline-item:hover{transform:translateX(8px);box-shadow:var(--elev-raised)}
    .timeline-dot{position:absolute;left:-33px;top:24px;width:14px;height:14px;border-radius:50%;border:3px solid var(--surface)}
    .timeline-dot.purple{background:var(--accent);box-shadow:0 0 0 2px var(--accent)}
    .timeline-dot.coral{background:var(--accent-coral);box-shadow:0 0 0 2px var(--accent-coral)}
    .timeline-dot.mint{background:var(--accent-mint);box-shadow:0 0 0 2px var(--accent-mint)}
    .timeline-date{font-size:var(--text-sm);color:var(--muted);margin-bottom:var(--space-2);font-weight:500}
    .timeline-title{font-size:var(--text-lg);font-weight:600;margin-bottom:var(--space-2)}
    .timeline-desc{font-size:var(--text-sm);color:var(--fg-2);line-height:1.6}
    .timeline-detail{max-height:0;overflow:hidden;transition:max-height var(--motion-slow) var(--ease-standard)}
    .timeline-detail.open{max-height:300px;padding-top:var(--space-4)}
    .timeline-detail-inner{padding:var(--space-4);background:var(--surface-cool);border-radius:var(--radius-sm);font-size:var(--text-sm);color:var(--fg-2);line-height:1.6}

    /* Highlight (闪光时刻) 编辑样式 */
    .hl-reflection{display:none;width:100%;margin-top:var(--space-3);padding:var(--space-3);background:var(--surface-cool);border:1px dashed var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:var(--text-sm);color:var(--fg-2);line-height:1.6;resize:vertical;min-height:48px}
    .hl-year,.hl-title,.hl-desc{transition:background var(--motion-fast),outline-color var(--motion-fast);border-radius:6px;padding:2px 4px;margin:-2px -4px}
    body.edit-mode .hl-year,body.edit-mode .hl-title,body.edit-mode .hl-desc{contenteditable:true;outline:1px dashed var(--border);background:color-mix(in oklch,var(--accent) 6%,transparent)}
    body.edit-mode .hl-year:focus,body.edit-mode .hl-title:focus,body.edit-mode .hl-desc:focus{outline:2px solid var(--accent);background:color-mix(in oklch,var(--accent) 12%,transparent)}
    body.edit-mode .hl-reflection{display:block}
    body.edit-mode .timeline-item{cursor:default}
    body.edit-mode .timeline-item .timeline-dot{outline:2px dashed var(--border)}

    /* Ability */
    .ability-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-10);align-items:center;max-width:800px;margin:0 auto}
    .radar-chart{position:relative;width:100%;max-width:320px;margin:0 auto}
    .radar-chart svg{width:100%;height:auto}
    .ability-bars{display:flex;flex-direction:column;gap:var(--space-6)}
    .ability-header{display:flex;justify-content:space-between;margin-bottom:var(--space-2)}
    .ability-name{font-weight:600;font-size:var(--text-base)}
    .ability-value{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--accent);font-weight:600}
    .ability-track{height:12px;background:var(--border-soft);border-radius:var(--radius-pill);overflow:hidden}
    .ability-fill{height:100%;border-radius:var(--radius-pill);width:0;transition:width 1.2s var(--ease-standard)}
    .ability-fill.purple{background:linear-gradient(90deg,color-mix(in oklch,var(--accent) 60%,#fff),var(--accent))}
    .ability-fill.coral{background:linear-gradient(90deg,color-mix(in oklch,var(--accent-coral) 60%,#fff),var(--accent-coral))}
    .ability-fill.mint{background:linear-gradient(90deg,color-mix(in oklch,var(--accent-mint) 60%,#fff),var(--accent-mint))}
    @media(max-width:700px){.ability-grid{grid-template-columns:1fr}}

    /* Pet */
    .pet-card{max-width:600px;margin:0 auto;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--elev-raised);border:1px solid var(--border)}
    .pet-header{padding:var(--space-6);background:linear-gradient(135deg,color-mix(in oklch,var(--accent) 20%,#fef3c7),color-mix(in oklch,var(--accent-coral) 15%,#fde68a));text-align:center}
    .pet-photo{width:120px;height:120px;margin:0 auto var(--space-4)}
    .pet-photo .photo-fallback{border-radius:50%}
    .pet-photo img{border-radius:50%}
    .pet-name{font-size:var(--text-2xl);font-weight:700}
    .pet-subtitle{font-size:var(--text-sm);margin-top:var(--space-1)}
    .pet-body{padding:var(--space-6)}
    .pet-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-top:var(--space-6)}
    .pet-stat{text-align:center;padding:var(--space-3);background:var(--surface-warm);border-radius:var(--radius-sm)}
    .pet-stat-value{font-size:var(--text-xl);font-weight:700;color:var(--accent-coral)}
    .pet-stat-label{font-size:var(--text-xs);color:var(--muted);margin-top:var(--space-1)}

    /* Messages */
    .message-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-6)}
    .message-card{background:var(--surface);border-radius:var(--radius-md);padding:var(--space-6);border:1px solid var(--border);position:relative;transition:transform var(--motion-base) var(--ease-bounce),box-shadow var(--motion-base)}
    .message-card:hover{transform:translateY(-6px) rotate(-0.5deg);box-shadow:var(--elev-float)}
    .message-card::before{content:'"';position:absolute;top:8px;right:16px;font-size:48px;line-height:1;opacity:.08;color:var(--accent)}
    .message-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent-soft),var(--fg-soft));display:flex;align-items:center;justify-content:center;font-size:var(--text-xl);margin-bottom:var(--space-4);border:2px solid var(--border)}
    .message-name{font-weight:600;margin-bottom:var(--space-1)}
    .message-date{font-size:var(--text-xs);color:var(--muted);margin-bottom:var(--space-4)}
    .message-text{font-size:var(--text-sm);line-height:1.7;color:var(--fg-2)}
    .message-handwritten{margin-top:var(--space-4);overflow:hidden;border:1px solid var(--border)}
    .message-handwritten img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}

    /* Teacher */
    .teacher-card{max-width:700px;margin:0 auto;background:var(--surface);border-radius:var(--radius-lg);padding:var(--space-10);border:1px solid var(--border);position:relative;overflow:hidden}
    .teacher-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent-coral),var(--accent-mint))}
    .teacher-icon{width:60px;height:60px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:var(--space-6)}
    .teacher-name{font-size:var(--text-lg);font-weight:600;margin-bottom:var(--space-1)}
    .teacher-role{font-size:var(--text-sm);color:var(--muted);margin-bottom:var(--space-6)}
    .teacher-message{font-size:var(--text-lg);line-height:1.8;color:var(--fg-2);font-style:italic;padding-left:var(--space-6);border-left:3px solid var(--accent)}

    /* Envelope */
    .envelope-wrapper{max-width:500px;margin:0 auto;perspective:1000px}
    .envelope{position:relative;cursor:pointer;transition:transform var(--motion-slow) var(--ease-standard)}
    .envelope:hover{transform:translateY(-4px)}
    .envelope-body{background:var(--envelope-gradient);border-radius:var(--radius-lg);padding:var(--space-10);border:2px solid color-mix(in oklch,var(--accent) 20%,transparent);position:relative;overflow:hidden}
    .envelope-flap{position:absolute;top:0;left:0;right:0;height:50%;background:color-mix(in oklch,var(--envelope-gradient),var(--accent) 10%);border-radius:var(--radius-lg) var(--radius-lg) 0 0;transform-origin:top center;transition:transform .6s var(--ease-standard);z-index:2;display:flex;align-items:center;justify-content:center}
    .envelope.open .envelope-flap{transform:rotateX(180deg)}
    .envelope-seal{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);width:48px;height:48px;background:linear-gradient(135deg,var(--accent),color-mix(in oklch,var(--accent),#fff 30%));border-radius:50%;z-index:3;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 12px color-mix(in oklch,var(--accent) 30%,transparent);transition:transform .4s var(--ease-bounce)}
    .envelope.open .envelope-seal{transform:translate(-50%,50%) scale(0)}
    .letter-content{max-height:0;overflow:hidden;transition:max-height .8s var(--motion-slow) var(--ease-standard),opacity .4s ease;opacity:0}
    .envelope.open .letter-content{max-height:600px;opacity:1;margin-top:var(--space-6)}
    .letter-inner{background:#fffef7;border-radius:var(--radius-md);padding:var(--space-8);border:1px solid #fde68a;line-height:2;font-size:var(--text-base);color:var(--fg-2);white-space:pre-wrap}
    .envelope-hint{text-align:center;margin-top:var(--space-4);font-size:var(--text-sm);color:var(--muted)}

    /* Finale */
    .finale-section{text-align:center;background:var(--hero-gradient);padding:clamp(60px,10vw,120px) var(--gutter);position:relative;overflow:hidden}
    .finale-title{font-size:clamp(48px,10vw,96px);font-weight:800;background:linear-gradient(135deg,#fff,color-mix(in oklch,#fff,var(--accent) 10%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--space-8)}
    .finale-subtitle{font-size:clamp(16px,3vw,22px);color:var(--fg-2);margin-bottom:var(--space-10)}
    .finale-photo{max-width:800px;margin:0 auto var(--space-8);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--elev-float)}
    .pagefoot{padding:var(--space-8) var(--gutter);text-align:center;color:var(--muted);font-size:var(--text-sm);border-top:1px solid var(--border)}

    /* ═══ Empty / placeholder state ═══ */
    .empty-state{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--space-8)}
    .empty-icon{font-size:80px;margin-bottom:var(--space-8);animation:float 3s ease-in-out infinite}
    .empty-title{font-size:var(--text-2xl);font-weight:700;margin-bottom:var(--space-4)}
    .empty-desc{font-size:var(--text-lg);color:var(--muted);max-width:40ch;margin-bottom:var(--space-8)}
    .empty-number{font-family:var(--font-mono);font-size:var(--text-4xl);font-weight:700;color:var(--accent);margin-bottom:var(--space-4)}
    .empty-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--accent);color:var(--accent-on);border-radius:var(--radius-pill);font-weight:600;font-size:var(--text-base);transition:background var(--motion-base);box-shadow:var(--elev-raised)}
    .empty-btn:hover{background:color-mix(in oklab,var(--accent),black 8%)}

    /* ═══ Privacy lock ═══ */
    .lock-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8)}
    .lock-icon{font-size:64px;margin-bottom:var(--space-6)}
    .lock-title{font-size:var(--text-2xl);font-weight:700;margin-bottom:var(--space-4)}
    .lock-desc{color:var(--muted);margin-bottom:var(--space-8);font-size:var(--text-lg)}
    .lock-input{display:flex;gap:var(--space-3);align-items:center}
    .lock-input input{padding:12px 20px;border:2px solid var(--border);border-radius:var(--radius-md);font-size:var(--text-base);outline:none;transition:border-color var(--motion-fast);width:200px;text-align:center;font-family:var(--font-body)}
    .lock-input input:focus{border-color:var(--accent)}
    .lock-input button{padding:12px 24px;background:var(--accent);color:#fff;border-radius:var(--radius-md);font-weight:600;transition:background var(--motion-fast)}
    .lock-input button:hover{background:color-mix(in oklab,var(--accent),black 10%)}
    .lock-error{color:var(--danger);font-size:var(--text-sm);margin-top:var(--space-4);min-height:20px}

    /* Back button */
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:var(--text-sm);color:var(--muted);transition:color var(--motion-fast);margin-bottom:var(--space-8)}
    .back-link:hover{color:var(--accent)}

    /* Edit FAB */
    .edit-fab{position:fixed;bottom:24px;right:24px;z-index:90;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-coral));color:white;display:grid;place-items:center;font-size:22px;box-shadow:0 6px 20px rgba(168,85,247,0.35);cursor:pointer;transition:transform 0.2s var(--ease-bounce),box-shadow 0.2s}
    .edit-fab:hover{transform:scale(1.12);box-shadow:0 10px 30px rgba(168,85,247,0.45)}

    /* 8 个素材槽位 — asset overlay rules */
    .hero-section.has-asset-hero-bg::before{background-image:var(--asset-hero-bg);opacity:1}
    .profile-card.has-asset-profile-frame{background-image:var(--asset-profile-frame);background-size:100% 100%;background-position:center;background-repeat:no-repeat}
    .timeline-dot.has-asset-timeline-marker{background-image:var(--asset-timeline-marker);background-color:transparent;background-size:contain;background-position:center;background-repeat:no-repeat;box-shadow:none;border:none;border-radius:0;width:24px;height:24px;left:-38px}
    .ability-track.has-asset-ability-bar-bg{background-image:var(--asset-ability-bar-bg);background-color:transparent;background-size:100% 100%}
    .ability-fill.has-asset-ability-bar-fill{background-image:var(--asset-ability-bar-fill);background-color:transparent;background-size:100% 100%}
    .envelope.has-asset-envelope-closed .envelope-body{background-image:var(--asset-envelope-closed),var(--envelope-gradient);background-size:contain,cover;background-repeat:no-repeat;background-position:center}
    .envelope.open.has-asset-envelope-open .envelope-body{background-image:var(--asset-envelope-open),var(--envelope-gradient);background-size:contain,cover;background-repeat:no-repeat;background-position:center}
    .envelope-seal.has-asset-stamp{background-image:var(--asset-stamp);background-size:contain;background-repeat:no-repeat;background-position:center;color:transparent;background-color:transparent;box-shadow:none}
  </style>
</head>
<body>

<!-- Privacy lock (hidden by default, shown via JS when needed) -->
<div class="lock-overlay" id="lockOverlay" style="display:none" data-od-id="lock">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">这位同学设置了隐私保护</div>
  <div class="lock-desc">输入密码查看TA的纪念册</div>
  <div class="lock-input">
    <input type="password" id="lockPassword" placeholder="输入密码" />
    <button onclick="checkPassword()">解锁</button>
  </div>
  <div class="lock-error" id="lockError"></div>
</div>

<!-- Empty state (shown when student data not filled) -->
<div class="empty-state" id="emptyState" style="display:none" data-od-id="empty">
  <div class="empty-number" id="emptyNumber"></div>
  <div class="empty-icon">📝</div>
  <div class="empty-title">这个页面还在等待TA来填写</div>
  <div class="empty-desc" id="emptyDesc"></div>
  <a href="index.html" class="empty-btn">返回班级首页</a>
</div>

<!-- Theme Preview Modal -->
<div class="tp-mask" id="tpMask" onclick="if(event.target===this)closeThemePreview()">
  <div class="tp-card" onclick="event.stopPropagation()">
    <div class="tp-hero" id="tpHero">
      <div class="tp-hero-content">
        <div class="tp-hero-emoji" id="tpEmoji"></div>
        <div class="tp-hero-name" id="tpName"></div>
        <div class="tp-hero-tagline" id="tpTagline"></div>
      </div>
    </div>
    <div class="tp-body">
      <div class="tp-section">
        <div class="tp-label">色彩调色板</div>
        <div class="tp-swatches" id="tpSwatches"></div>
      </div>
      <div class="tp-section">
        <div class="tp-label">主题信息</div>
        <div class="tp-info-grid" id="tpInfo"></div>
      </div>
    </div>
    <div class="tp-foot">
      <button class="tp-cancel" onclick="closeThemePreview()">取消</button>
      <button class="tp-choose" id="tpChoose" onclick="confirmThemePreview()">✓ 选这个主题</button>
    </div>
  </div>
</div>

<!-- Main content (rendered by JS) -->
<div id="mainContent" style="display:none"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   TEMPLATE TOKEN MAP
   ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   APPLY TEMPLATE TOKENS
   ═══════════════════════════════════════════════════════════ */
function applyTemplate(templateId) {
  // 优先从 templates-registry 取自定义/AI 主题
  let tokens = null;
  let assets = null;
  try {
    const reg = getTemplateRegistry();
    if (reg[templateId]) {
      if (reg[templateId].tokens) tokens = reg[templateId].tokens;
      if (reg[templateId].assets) assets = reg[templateId].assets;
    }
  } catch(e) {}
  if (!tokens) tokens = TEMPLATE_TOKENS[templateId] || TEMPLATE_TOKENS['starlight-admission'];
  const root = document.documentElement;
  Object.entries(tokens).forEach(([k, v]) => root.style.setProperty(k, v));
  /* Hero 背景图：若 token 包含 --hero-bg，给 .hero-section 加 class */
  const hero = document.querySelector('.hero-section');
  if (hero) {
    if (tokens['--hero-bg']) hero.classList.add('has-hero-bg');
    else hero.classList.remove('has-hero-bg');
  }
  /* 统一素材系统：写 --asset-* CSS 变量（hero-bg 也走 asset 槽） */
  const ASSET_SLOTS = [
    ['heroBg', 'hero-bg'],
    ['profileFrame', 'profile-frame'],
    ['timelineMarker', 'timeline-marker'],
    ['abilityBarBg', 'ability-bar-bg'],
    ['abilityBarFill', 'ability-bar-fill'],
    ['envelopeClosed', 'envelope-closed'],
    ['envelopeOpen', 'envelope-open'],
    ['stamp', 'stamp'],
  ];
  for (const [camelSlot, cssSlot] of ASSET_SLOTS) {
    const val = tokens['--asset-' + cssSlot] || assets?.[camelSlot] || null;
    root.style.setProperty('--asset-' + cssSlot, toCssImageValue(val));
  }
}

function toCssImageValue(value) {
  if (!value) return 'none';
  const raw = String(value).trim();
  if (!raw || raw === 'none') return 'none';
  if (/^url\(/i.test(raw)) return raw;
  return 'url("' + resolveThemeAssetUrl(raw).replace(/"/g, '%22') + '")';
}

function resolveThemeAssetUrl(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (/^(blob:|data:|https?:|\/)/i.test(raw)) return raw;
  if (raw.startsWith('themes/')) return '/api/themes/file/' + raw;
  return raw;
}

function getPreviewImageValue(value) {
  if (!value) return '';
  const raw = String(value).trim();
  const match = raw.match(/^url\((['"]?)(.*?)\1\)$/i);
  return resolveThemeAssetUrl(match ? match[2] : raw);
}

/* ═══════════════════════════════════════════════════════════
   THEME SWITCHER — 切换主题（保留所有数据）
   ═══════════════════════════════════════════════════════════ */
function getBuiltinTemplates() {
  return Object.keys(TEMPLATE_TOKENS).map(id => ({
    id,
    name: TEMPLATE_META[id]?.name || id,
    emoji: TEMPLATE_META[id]?.emoji || '🎨'
  }));
}
function getAllTemplatesForSwitch() {
  const stats = (() => { try { return JSON.parse(localStorage.getItem('template-stats') || '{}'); } catch(e) { return {}; } })();
  const total = Object.values(stats).reduce((a, b) => a + b, 0) || 1;

  const builtin = getBuiltinTemplates().map(t => {
    const tokens = TEMPLATE_TOKENS[t.id] || {};
    const count = stats[t.id] || 0;
    return Object.assign({type:'builtin', heroBg: getPreviewImageValue(tokens['--asset-hero-bg'] || tokens['--hero-bg'] || ''), pct: Math.round(count * 100 / total)}, t);
  });
  let custom = [];
  try { custom = Object.values(getTemplateRegistry()).map(t => { const count = stats[t.id] || 0; return Object.assign({type:'custom', heroBg: getPreviewImageValue(t.assets?.heroBg || ''), pct: Math.round(count * 100 / total)}, t); }); }
  catch(e) {}
  const seen = new Set();
  return builtin.concat(custom).filter(t => {
    if (!t.id || seen.has(t.id)) return false;
    seen.add(t.id);
    return true;
  });
}

function getTemplateRegistry() {
  try { return JSON.parse(localStorage.getItem('templates-registry') || '{}'); }
  catch(e) { return {}; }
}

function saveTemplateRegistry(reg) {
  localStorage.setItem('templates-registry', JSON.stringify(reg));
}

function getTemplateMeta(id) {
  const builtin = TEMPLATE_META[id];
  if (builtin) {
    const tokens = TEMPLATE_TOKENS[id] || {};
    return { name: builtin.name, emoji: builtin.emoji, type: builtin.type, audience: builtin.audience, heroBg: getPreviewImageValue(tokens['--asset-hero-bg'] || tokens['--hero-bg'] || '') };
  }
  const reg = getTemplateRegistry();
  const t = reg[id] || {};
  return { name: id, emoji: t.emoji || '🎨', type: t.type || 'custom', audience: t.audience || '通用', heroBg: getPreviewImageValue(t.assets?.heroBg || '') };
}

async function syncSharedTemplates() {
  const res = await fetch('/api/templates');
  if (!res.ok) return;
  const json = await res.json();
  const shared = json.templates || [];
  if (!shared.length) return;
  const reg = getTemplateRegistry();
  shared.forEach(tpl => {
    reg[tpl.id] = Object.assign({ type: tpl.type || 'custom', shared: true }, tpl);
  });
  saveTemplateRegistry(reg);
}

function openThemeSwitcher() {
  if (!window._student) { alert('请等待页面加载完成'); return; }
  const all = getAllTemplatesForSwitch();
  const currentId = window._student.template || 'starlight-admission';
  const html = `
    <div class="ts-overlay" onclick="if(event.target===this)closeThemeSwitcher()">
      <div class="ts-card" onclick="event.stopPropagation()">
        <div class="ts-head">
          <h3>🎨 切换主题</h3>
          <button class="ts-close" onclick="closeThemeSwitcher()">×</button>
        </div>
        <p class="ts-hint">切换主题不会丢失任何数据（照片、闪光时刻、能力值等）</p>
        <div class="ts-grid">
          ${all.map(t => `
            <div class="ts-item ${t.id === currentId ? 'selected' : ''}" data-id="${t.id}" data-hero-bg="${t.heroBg||''}" onclick="openThemePreview('${t.id}')">
              <div class="ts-emoji">${t.emoji || '🎨'}</div>
              <div class="ts-name">${t.name}</div>
              <div class="ts-type">${t.type||'custom'}${t.pct ? ' · '+t.pct+'%' : ''}</div>
            </div>
          `).join('')}
        </div>
        <div class="ts-foot">
          <button class="ts-btn" onclick="openUploadFromSwitcher()">📦 上传新主题</button>
          <button class="ts-btn primary" onclick="openAiFromSwitcher()">✨ AI 生成</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  /* 给带 heroBg 的主题缩略图设背景图 */
  document.querySelectorAll('.ts-item[data-hero-bg]').forEach(el => {
    const bg = el.getAttribute('data-hero-bg');
    if (bg) {
      el.classList.add('has-preview-bg');
      el.style.backgroundImage = 'url("' + bg.replace(/"/g, '%22') + '")';
    }
  });
}
function closeThemeSwitcher() {
  const el = document.querySelector('.ts-overlay');
  if (el) el.remove();
}

function openThemePreview(templateId) {
  _tpSelectedId = templateId;
  const builtin = TEMPLATE_TOKENS[templateId];
  const custom = getTemplateRegistry()[templateId];
  const meta = getTemplateMeta(templateId);
  const tokens = builtin || (custom && custom.tokens) || {};
  const colors = (builtin && [tokens['--bg'], tokens['--accent'], tokens['--accent-mint'], tokens['--fg']])
                || (custom && custom.colors)
                || ['#888', '#aaa', '#ccc', '#444'];
  const tagline = (builtin ? tokens['--particle-colors'] : null) || (custom && custom.description) || '';

  /* Hero 区：注入 token 变量预览 */
  const hero = document.getElementById('tpHero');
  hero.style.setProperty('--hero-gradient', tokens['--hero-gradient'] || 'linear-gradient(135deg, #444 0%, #222 100%)');
  hero.style.setProperty('--asset-hero-bg', toCssImageValue(tokens['--asset-hero-bg'] || (custom && custom.assets && custom.assets.heroBg) || null));
  /* 触发素材 class */
  const hasHeroAsset = (tokens['--asset-hero-bg'] || (custom && custom.assets && custom.assets.heroBg)) ? 'has-asset-hero-bg' : '';
  hero.className = 'tp-hero ' + hasHeroAsset;

  document.getElementById('tpName').textContent = meta.name || templateId;
  document.getElementById('tpTagline').textContent = tagline ? '粒子色：' + (typeof tagline === 'string' ? tagline.split(',').slice(0,3).map(c=>c.trim()).join(' ') : '') : '';

  /* 调色板 */
  document.getElementById('tpSwatches').innerHTML = colors.slice(0, 4).map(c => {
    const hex = String(c).trim();
    return `<div class="tp-swatch" style="background:${hex}">${hex}</div>`;
  }).join('');

  /* 主题信息 */
  const fontValue = tokens['--font-display'] || tokens['--font-body'] || '默认';
  const radius = tokens['--radius-md'] || '16px';
  const accent = tokens['--accent'] || '—';
  const bg = tokens['--bg'] || '—';
  const audience = meta.audience || (custom && custom.audience) || '通用';
  const particleCount = (typeof tagline === 'string' ? tagline.split(',').filter(Boolean).length : 0);
  document.getElementById('tpInfo').innerHTML = `

async function applySwitchTheme(tplId) {
  if (!window._student) return;
  window._student.template = tplId;
  const tplName = getTemplateMeta(tplId).name || tplId;

  // 本机优先保存，立即生效
  localStorage.setItem('student-' + window._student.id, JSON.stringify(window._student));
  try {
    const stats = JSON.parse(localStorage.getItem('template-stats') || '{}');
    stats[tplId] = (stats[tplId] || 0) + 1;
    localStorage.setItem('template-stats', JSON.stringify(stats));
  } catch(e) {}

  applyTemplate(tplId);
  render(window._student, window._data);
  closeThemeSwitcher();

  // 已有密码则后台同步云端
  const pwd = window._ownerPassword;
  if (pwd) {
    fetch(`/api/students/${encodeURIComponent(window._student.id)}/template`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd, template: tplId })
    }).then(r => r.ok && showTsToast('✓ 主题已保存：' + tplName))
      .catch(() => showTsToast('✓ 主题已切换：' + tplName));
  } else {
    showTsToast('✓ 主题已切换：' + tplName);
  }
}
function openUploadFromSwitcher() { closeThemeSwitcher(); setTimeout(() => parent.postMessage({type:'openUpload'}, '*'), 50); /* fallback */ window.location.href = 'onboarding.html?type=student&id=' + window._student.id; }
function openAiFromSwitcher() { closeThemeSwitcher(); window.location.href = 'onboarding.html?type=student&id=' + window._student.id; }
function showTsToast(msg) {
  const t = document.createElement('div');
  t.className = 'ts-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 1800);
}

/* ═══════════════════════════════════════════════════════════
   API → 渲染层 适配（D1 是 snake_case，前端用 camelCase）
   ═══════════════════════════════════════════════════════════ */
function adaptStudentFromApi(raw) {
  if (!raw) return null;
  const photos = raw.photos || { avatar: null, life: [], school: [], future: [], pet: null, handwritten: null };
  const pet = raw.pet || null;
  if (pet && !pet.photo && photos.pet) {
    pet.photo = photos.pet.url || photos.pet;
  }
  return {
    ...raw,
    studentNumber: raw.student_number || raw.id,
    futureLetter: raw.future_letter || '',
    isFounder: !!raw.is_founder,
    isPublic: !!raw.is_public,
    abilities: {
      swimming: raw.abilities_swim || 0,
      tech: raw.abilities_tech || 0,
      responsibility: raw.abilities_resp || 0,
    },
    pet,
    photos,
    messages: [],
  };
}

function adaptStudentFromJson(raw) {
  if (!raw) return null;
  return {
    ...raw,
    studentNumber: raw.studentNumber || raw.student_number || raw.id,
    futureLetter: raw.futureLetter || raw.future_letter || '',
    isFounder: !!(raw.isFounder || raw.is_founder),
    isPublic: raw.isPublic !== false && raw.is_public !== 0,
    abilities: raw.abilities || {
      swimming: raw.abilities_swim || 0,
      tech: raw.abilities_tech || 0,
      responsibility: raw.abilities_resp || 0,
    },
    photos: raw.photos || { avatar: null, life: [], school: [], future: [], pet: null, handwritten: null },
    messages: raw.messages || [],
  };
}

function createEmptyStudent(id) {
  return {
    id,
    name: '',
    nickname: '',
    studentNumber: id,
    class: '六年级4班',
    school: '松柏第二小学',
    tags: [],
    motto: '',
    photos: { avatar: '', life: [], school: [], future: [] },
    highlights: [],
    abilities: { swimming: 0, tech: 0, responsibility: 0 },
    pet: null,
    futureLetter: '',
    template: 'starlight-admission',
    stickers: [],
    isPublic: true,
    password: '',
    messages: []
  };
}

async function loadStudentFromStaticJson(studentId) {
  const res = await fetch('data/students.json');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  const found = (json.students || []).find(s => s.id === studentId);
  const student = adaptStudentFromJson(found || createEmptyStudent(studentId));
  return { student, data: json };
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
(async function() {
  const params = new URLSearchParams(location.search);
  const studentId = params.get('id');
  if (!studentId) { location.href = 'index.html'; return; }

  let student = null;
  let data = null;

  try {
    const res = await fetch('/api/students/' + encodeURIComponent(studentId));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    student = adaptStudentFromApi(raw);
    data = { students: [student], templates: [] };
  } catch(e) {
    /* 本地预览或 API 不可用时，才回退到浏览器缓存和静态 JSON */
  }

  if (!student) {
    const lsData = localStorage.getItem('student-' + studentId);
    try {
      if (lsData) {
        student = JSON.parse(lsData);
        data = { students: [student], templates: [] };
      }
    } catch(e) { student = null; }
  }

  if (!student) {
    try {
      const loaded = await loadStudentFromStaticJson(studentId);
      student = loaded.student;
      data = loaded.data;
    } catch(e) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;"><h2>加载失败</h2><p style="color:#999;">无法读取学生数据</p><a href="index.html" style="color:#a855f7;">返回首页</a></div>';
      return;
    }
  }

  if (!student) {
    document.body.innerHTML = '<div style="text-align:center;padding:80px 20px;"><h2>找不到这位同学</h2><p style="color:#999;">学号 ' + studentId + ' 不存在</p><a href="index.html" style="color:#a855f7;">返回首页</a></div>';
    return;
  }

  await syncSharedTemplates().catch(() => {});

  /* Apply template */
  applyTemplate(student.template || 'starlight-admission');
  window._student = student;
  window._data = data;

  /* 优先合并云端留言；纯静态预览时会安静地使用 JSON 内置留言 */
  await fetchAndMergeMessages(student).catch(() => {});

  /* Check privacy */
  if (!student.isPublic && student.password) {
    const lock = document.getElementById('lockOverlay');
    lock.style.display = 'flex';
    return;
  }

  render(student, data);
  loadClassPhoto().catch(() => {});
})();

function checkPassword() {
  const input = document.getElementById('lockPassword').value;
  if (input === window._student.password) {
    window._ownerPassword = input;
    document.getElementById('lockOverlay').style.display = 'none';
    render(window._student, window._data);
  } else {
    document.getElementById('lockError').textContent = '密码不对哦，再试试～';
  }
}

/* Enter key support */
document.getElementById('lockPassword')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function avatarFromName(name) {
  const emojis = ['🌸','🌟','🎨','⚡','🎯','🌈','🍀','🎵','🏆','💫'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return emojis[Math.abs(hash) % emojis.length];
}

function buildAbilityBar(label, value, color) {
  return `<div class="ability-item">
    <div class="ability-header">
      <span class="ability-name">${label}</span>
      <span class="ability-value num">${value}%</span>
    </div>
    <div class="ability-track" data-asset="ability-bar-bg"><div class="ability-fill ${color}" data-width="${value}" data-asset="ability-bar-fill"></div></div>
  </div>`;
}

function buildRadarSVG(ab) {
  const vals = [ab.swimming||50, ab.tech||50, ab.responsibility||50, ab.creativity||50, ab.warmth||50, ab.learning||50];
  const labels = ['游泳','AI编程','责任心','创造力','暖心值','学习力'];
  const cx=150, cy=140, R=110;
  let pts = vals.map((v,i) => {
    const angle = (Math.PI/3)*i - Math.PI/2;
    const r = R * (v/100);
    return { x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) };
  });
  return `<svg viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
    <polygon points="150,30 255,82 255,187 150,240 45,187 45,82" fill="none" stroke="var(--border)" stroke-width="1"/>
    <polygon points="150,65 220,100 220,170 150,205 80,170 80,100" fill="none" stroke="var(--border)" stroke-width="1"/>
    <polygon points="150,100 185,118 185,153 150,170 115,153 115,118" fill="none" stroke="var(--border)" stroke-width="1"/>
    ${labels.map((l,i) => {
      const angle = (Math.PI/3)*i - Math.PI/2;
      const lx = cx + (R+22)*Math.cos(angle);
      const ly = cy + (R+22)*Math.sin(angle);
      return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--fg)" font-size="12" font-weight="600">${l}</text>`;
    }).join('')}
    <polygon points="${pts.map(p=>p.x+','+p.y).join(' ')}" fill="color-mix(in oklch, var(--accent) 18%, transparent)" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)"/>`).join('')}
  </svg>`;
}

/* ═══════════════════════════════════════════════════════════
   SCRIPTS (particles, scroll-reveal, ability bars)
   ═══════════════════════════════════════════════════════════ */
function initScripts() {
  /* Particles */
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let particles = [], w, h;
  const colorStr = getComputedStyle(document.documentElement).getPropertyValue('--particle-colors').trim();
  const colors = colorStr ? colorStr.split(',').map(c => c.trim()) : ['#c084fc','#f9a8d4','#86efac'];

  function resize() {
    const hero = canvas.parentElement;
    w = canvas.width = hero.offsetWidth;
    h = canvas.height = hero.offsetHeight;
  }
  function createP() {
    return { x:Math.random()*w, y:Math.random()*h, size:Math.random()*4+1, sx:(Math.random()-.5)*.8, sy:(Math.random()-.5)*.8, color:colors[Math.floor(Math.random()*colors.length)], opacity:Math.random()*.5+.2 };
  }
  function init() {
    resize(); particles = [];
    const count = Math.min(Math.floor(w*h/8000), 120);
    for (let i = 0; i < count; i++) particles.push(createP());
  }
  function draw() {
    ctx.clearRect(0,0,w,h);
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity; ctx.fill();
      p.x += p.sx; p.y += p.sy;
      if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
    });
    ctx.globalAlpha = 0.06;
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=particles[i].color;ctx.globalAlpha=.06*(1-d/120);ctx.stroke();}
    }
    ctx.globalAlpha=1; requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  init(); draw();

  /* Scroll reveal */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* Ability bars */
  const abIO = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        e.target.querySelectorAll('.ability-fill').forEach(f => {
          setTimeout(() => { f.style.width = f.getAttribute('data-width') + '%'; }, 200);
        });
        abIO.unobserve(e.target);
      }
    });
  }, { threshold: 0.3 });
  const ab = document.getElementById('abilities');
  if(ab) abIO.observe(ab);

  /* Gallery carousel */
  initGallery();

  /* Highlights (闪光时刻) 编辑模式 */
  initHighlightEditor();
}

/* ═══════════════════════════════════════════════════════════
   HIGHLIGHT EDITOR (闪光时刻 · 同步到 D1)
   ═══════════════════════════════════════════════════════════ */
function getHighlightStore(id) {
  const key = 'highlights-' + id;
  try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch (e) { return {}; }
}
function setHighlightStore(id, data) {
  const key = 'highlights-' + id;
  localStorage.setItem(key, JSON.stringify(data));
}
async function syncHighlightsToCloud(s) {
  if (!s || !s.highlights) return;
  if (!window._ownerPassword) {
    flashHlStatus('⚠️ 需要解锁后才能同步到云端', 'warn');
    return;
  }
  try {
    const res = await fetch(`/api/students/${encodeURIComponent(s.id)}/highlights`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: window._ownerPassword, highlights: s.highlights })
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) {
      flashHlStatus('✗ 云端同步失败：' + (json.error || res.statusText), 'error');
      return false;
    }
    flashHlStatus('✓ 已同步到云端', 'success');
    return true;
  } catch (e) {
    flashHlStatus('✗ 网络错误：' + e.message, 'error');
    return false;
  }
}
let _hlStatusTimer = null;
function flashHlStatus(msg, type) {
  const btn = document.getElementById('highlightEditBtn');
  if (!btn) return;
  const orig = btn.dataset.origText || btn.innerHTML;
  btn.dataset.origText = orig;
  btn.innerHTML = msg;
  const colors = { success: 'linear-gradient(135deg,#34d399,#10b981)', error: 'linear-gradient(135deg,#e5484d,#dc2626)', warn: 'linear-gradient(135deg,#ffb020,#f59e0b)' };
  btn.style.background = colors[type] || colors.warn;
  clearTimeout(_hlStatusTimer);
  _hlStatusTimer = setTimeout(() => {
    btn.innerHTML = orig;
    btn.style.background = document.body.classList.contains('edit-mode')
      ? 'linear-gradient(135deg,var(--accent-mint),var(--accent))'
      : 'linear-gradient(135deg,var(--accent),var(--accent-coral))';
  }, 1500);
}
async function initHighlightEditor() {
  const s = window.__studentData;
  if (!s || !s.highlights || !s.highlights.length) return;
  const id = s.id;
  const store = getHighlightStore(id);

  /* 加载本地编辑覆盖 */
  document.querySelectorAll('.timeline-item').forEach((item, i) => {
    const h = store[i];
    if (!h) return;
    if (h.year != null) item.querySelector('.hl-year').textContent = h.year;
    if (h.title != null) item.querySelector('.hl-title').textContent = h.title;
    if (h.desc != null) item.querySelector('.hl-desc').textContent = h.desc;
    if (h.reflection != null) item.querySelector('.hl-reflection').value = h.reflection;
  });

  /* 编辑模式开关（密码解锁） */
  if (!document.getElementById('highlightEditBtn')) {
    const btn = document.createElement('button');
    btn.id = 'highlightEditBtn';
    btn.innerHTML = '✏️ 编辑闪光时刻';
    btn.style.cssText = 'position:fixed;bottom:24px;left:24px;z-index:90;padding:10px 18px;background:linear-gradient(135deg,var(--accent),var(--accent-coral));color:#fff;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,0.18);cursor:pointer;border:none;transition:transform 0.2s';
    btn.onmouseover = () => btn.style.transform = 'scale(1.05)';
    btn.onmouseout = () => btn.style.transform = 'scale(1)';
    btn.onclick = toggleHighlightEdit;
    document.body.appendChild(btn);
  }

  /* 失焦自动保存到 localStorage + 云端 */
  document.querySelectorAll('.timeline-item').forEach((item, i) => {
    const save = async () => {
      const data = getHighlightStore(id);
      data[i] = {
        year: item.querySelector('.hl-year').textContent.trim(),
        title: item.querySelector('.hl-title').textContent.trim(),
        desc: item.querySelector('.hl-desc').textContent.trim(),
        reflection: item.querySelector('.hl-reflection').value.trim()
      };
      setHighlightStore(id, data);
      /* 同步到 s.highlights 顶层（用于云端 PUT） */
      if (s.highlights && s.highlights[i]) {
        Object.assign(s.highlights[i], data[i]);
      }
      /* 失焦时不阻塞 UI；如已解锁则同步云端 */
      if (window._ownerPassword) {
        syncHighlightsToCloud(s);
      } else {
        flashHlStatus('💾 本地已保存（解锁后可同步云端）', 'warn');
      }
    };
    item.querySelectorAll('.hl-year, .hl-title, .hl-desc').forEach(el => el.addEventListener('blur', save));
    item.querySelector('.hl-reflection').addEventListener('input', save);
  });

  /* 后台拉取云端高光（如果已存在且本地没有未保存编辑） */
  fetchAndMergeHighlights(s).catch(() => {});
}
async function fetchAndMergeHighlights(s) {
  try {
    const res = await fetch(`/api/students/${encodeURIComponent(s.id)}/highlights`);
    if (!res.ok) return;
    const json = await res.json();
    const cloud = json.highlights;
    if (!Array.isArray(cloud) || cloud.length === 0) return;
    const store = getHighlightStore(s.id);
    const hasLocalEdits = Object.keys(store).length > 0;
    if (hasLocalEdits) {
      /* 本地有编辑，不覆盖；提示用户 */
      return;
    }
    /* 合并云端数据到 DOM */
    document.querySelectorAll('.timeline-item').forEach((item, i) => {
      const h = cloud[i];
      if (!h) return;
      if (h.year) item.querySelector('.hl-year').textContent = h.year;
      if (h.title) item.querySelector('.hl-title').textContent = h.title;
      if (h.desc) item.querySelector('.hl-desc').textContent = h.desc;
      if (h.reflection) item.querySelector('.hl-reflection').value = h.reflection;
    });
    /* 更新 s.highlights 供后续保存使用 */
    s.highlights = cloud;
  } catch (e) { /* 静默 */ }
}
function toggleHighlightEdit() {
  /* 若未解锁，要求密码 */
  if (!document.body.classList.contains('edit-mode') && !window._ownerPassword) {
    const pwd = prompt('请输入你的纪念册密码（解锁编辑）');
    if (!pwd) return;
    /* 验证密码：通过调用一次 API 试试（用一个无害的 GET） */
    authenticateOwner(pwd).then(ok => {
      if (!ok) {
        flashHlStatus('✗ 密码错误', 'error');
        return;
      }
      window._ownerPassword = pwd;
      doToggleHighlightEdit();
    });
    return;
  }
  doToggleHighlightEdit();
}
function doToggleHighlightEdit() {
  document.body.classList.toggle('edit-mode');
  const btn = document.getElementById('highlightEditBtn');
  const isEdit = document.body.classList.contains('edit-mode');
  btn.innerHTML = isEdit ? '💾 完成编辑' : '✏️ 编辑闪光时刻';
  btn.style.background = isEdit
    ? 'linear-gradient(135deg,var(--accent-mint),var(--accent))'
    : 'linear-gradient(135deg,var(--accent),var(--accent-coral))';
  /* 退出编辑模式时，主动同步一次云端 */
  if (!isEdit && window._ownerPassword) {
    const s = window.__studentData;
    syncHighlightsToCloud(s);
  }
}
async function authenticateOwner(pwd) {
  const s = window.__studentData;
  if (!s) return false;
  try {
    const res = await fetch(`/api/students/${encodeURIComponent(s.id)}/highlights`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd, highlights: s.highlights || [] })
    });
    return res.ok;
  } catch (e) { return false; }
}

/* ═══════════════════════════════════════════════════════════
   GALLERY CAROUSEL
   ═══════════════════════════════════════════════════════════ */
function initGallery() {
  const track = document.getElementById('carouselTrack');
  if (!track) return;
  const photos = window.__studentData?.photos || {};
  const norm = p => (typeof p === 'string' ? { src: p, url: p } : p);
  const all = [
    ...(photos.life || []).map(p => { const n = norm(p); return { src: n.url || n.src, cat: 'life', label: '生活照' }; }),
    ...(photos.school || []).map(p => { const n = norm(p); return { src: n.url || n.src, cat: 'school', label: '校园照' }; }),
    ...(photos.future || []).map(p => { const n = norm(p); return { src: n.url || n.src, cat: 'future', label: 'AI未来' }; })
  ];
  if (photos.pet) {
    const p = norm(photos.pet);
    all.push({ src: p.url || p.src, cat: 'pet', label: '宠物' });
  }
  galleryPhotos = all;
  const empty = document.getElementById('carouselEmpty');
  if (!all.length) {
    if (empty) empty.style.display = 'grid';
    document.querySelectorAll('.carousel-nav').forEach(b => b.style.display = 'none');
    const dots = document.getElementById('carouselDots');
    if (dots) dots.style.display = 'none';
    return;
  }
  if (empty) empty.style.display = 'none';
  renderSlides(all);
  currentSlideIdx = 0;
  startAutoPlay();
  const wrapper = document.getElementById('carouselWrapper');
  if (wrapper) {
    wrapper.addEventListener('mouseenter', stopAutoPlay);
    wrapper.addEventListener('mouseleave', startAutoPlay);
  }
}

function renderSlides(items) {
  const track = document.getElementById('carouselTrack');
  const dots = document.getElementById('carouselDots');
  if (!track) return;
      track.innerHTML = items.map((p, i) =>
        '<div class="carousel-slide"><img src="' + p.src + '" alt="' + p.label + '" loading="lazy" /><div class="slide-label">' + p.label + '</div></div>'
      ).join('');
  if (dots) {
    dots.innerHTML = items.map((_, i) =>
      '<button class="carousel-dot' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"></button>'
    ).join('');
  }
  track.style.transform = 'translateX(0)';
  const navBtns = document.querySelectorAll('.carousel-nav');
  navBtns.forEach(b => b.style.display = items.length > 1 ? '' : 'none');
  if (dots) dots.style.display = items.length > 1 ? '' : 'none';
}

function filterGallery(type, btn) {
  document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const filtered = type === 'all' ? galleryPhotos : galleryPhotos.filter(p => p.cat === type);
  currentSlideIdx = 0;
  stopAutoPlay();
  renderSlides(filtered);
  if (filtered.length > 1) startAutoPlay();
}

function moveSlide(dir) {
  const track = document.getElementById('carouselTrack');
  if (!track) return;
  const total = track.children.length;
  if (total <= 1) return;
  currentSlideIdx = (currentSlideIdx + dir + total) % total;
  track.style.transform = 'translateX(-' + (currentSlideIdx * 100) + '%)';
  updateDots();
}

function goToSlide(idx) {
  const track = document.getElementById('carouselTrack');
  if (!track) return;
  currentSlideIdx = idx;
  track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.carousel-dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSlideIdx);
  });
}

function startAutoPlay() {
  stopAutoPlay();
  autoPlayTimer = setInterval(() => moveSlide(1), 4000);
}

function stopAutoPlay() {
  if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
}

  const password = document.getElementById('uploadPassword').value;
  if (!_uploadState.file) { setUploadStatus('请选择图片', 'error'); return; }

  const btn = document.getElementById('uploadSubmitBtn');
  btn.disabled = true;
  btn.textContent = '上传中…';
  setUploadStatus('正在上传到云端…');

  try {
    const formData = new FormData();
    formData.append('file', _uploadState.file);
    formData.append('category', _uploadState.category);
    formData.append('student_id', s.id);
    formData.append('password', password);

    const res = await fetch('/api/photos/upload', { method: 'POST', body: formData });
    const json = await res.json().catch(() => ({}));

    if (!res.ok) {
      setUploadStatus('上传失败：' + (json.error || res.statusText), 'error');
      btn.disabled = false;
      btn.textContent = '上传';
      return;
    }

    /* 成功：合并到本地数据 + 重新渲染 gallery */
    const newPhoto = { id: json.id, url: json.url, category: json.category };
    if (!s.photos) s.photos = {};
    const cat = _uploadState.category;
    if (['avatar', 'pet', 'handwritten'].includes(cat)) {
      s.photos[cat] = newPhoto;
    } else {
      if (!Array.isArray(s.photos[cat])) s.photos[cat] = [];
      s.photos[cat].push(newPhoto);
    }
    /* 持久化到 localStorage 缓存 */
    try { localStorage.setItem('student-' + s.id, JSON.stringify(s)); } catch (e) {}

    setUploadStatus('✓ 上传成功！', 'success');
    showUploadToast('📸 照片已上传');
    setTimeout(() => {
      closePhotoUpload();
      render(s, window._data);
    }, 800);
  } catch (e) {
    setUploadStatus('网络错误：' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '上传';
  }
}
function setUploadStatus(msg, type) {
  const el = document.getElementById('uploadStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'upload-status' + (type ? ' ' + type : '');
}
function showUploadToast(msg) {
  const t = document.createElement('div');
  t.className = 'ts-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 1800);
}

/* ═══════════════════════════════════════════════════════════
   MESSAGES (留言板) — 后端 /api/messages
   ═══════════════════════════════════════════════════════════ */
let _allStudentsCache = null;

async function loadAllStudents() {
  if (_allStudentsCache) return _allStudentsCache;
  /* 优先用 window._data.students（可能不完整） */
  let all = (window._data && Array.isArray(window._data.students)) ? window._data.students : [];
  if (all.length <= 1) {
    try {
      const res = await fetch('/api/students');
      const data = await res.json();
      all = data.students || [];
    } catch (e) { /* ignore */ }
  }
  _allStudentsCache = all;
  return all;
}

function openMessageSend() {
  if (!window._student) { alert('学生数据未加载'); return; }
  loadAllStudents().then(all => {
    const me = window._student;
    const otherStudents = all.filter(s => s.id !== me.id);
    const html = `
      <div class="upload-overlay" id="msgSendOverlay" onclick="if(event.target===this)closeMessageSend()">
        <div class="upload-card" onclick="event.stopPropagation()">
          <div class="upload-head">
            <h3>💌 留言给 ${me.name}</h3>
            <button class="ts-close" onclick="closeMessageSend()">×</button>
          </div>
          <div class="upload-body">
            <div class="upload-field">
              <span class="upload-label">你是…（留言发送者）</span>
              <select id="msgFromId" class="upload-input">
                <option value="">— 请选择你的学号 —</option>
                ${otherStudents.map(s => `<option value="${s.id}">${s.id} · ${s.name}${s.nickname ? '（' + s.nickname + '）' : ''}</option>`).join('')}
              </select>
            </div>
            <div class="upload-field">
              <span class="upload-label">你的密码（确认身份）</span>
              <input type="password" id="msgFromPassword" class="upload-input" placeholder="有密码则输入，没有就直接发" autocomplete="off" />
            </div>
            <div class="upload-field">
              <span class="upload-label">留言给 TA</span>
              <input type="text" class="upload-input" value="📍 ${me.id} · ${me.name}" disabled />
            </div>
            <div class="upload-field">
              <span class="upload-label">想对 TA 说…</span>
              <textarea id="msgText" class="upload-input" rows="4" maxlength="500" placeholder="写下你的心里话…（500 字以内）" style="resize:vertical;line-height:1.6;font-family:inherit"></textarea>
            </div>
            <div class="upload-status" id="msgSendStatus"></div>
          </div>
          <div class="upload-foot">
            <button class="upload-btn" onclick="closeMessageSend()">取消</button>

}
function closeMessageSend() {
  const el = document.getElementById('msgSendOverlay');
  if (el) el.remove();
}
function setMsgStatus(msg, type) {
  const el = document.getElementById('msgSendStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'upload-status' + (type ? ' ' + type : '');
}
async function submitMessage() {
  const s = window._student;
  if (!s) return;
  const fromId = document.getElementById('msgFromId').value;
  const password = document.getElementById('msgFromPassword').value;
  const text = document.getElementById('msgText').value.trim();
  if (!fromId) { setMsgStatus('请选择你的学号', 'error'); return; }
  if (!text) { setMsgStatus('请输入留言内容', 'error'); return; }
  if (text.length > 500) { setMsgStatus('留言不能超过 500 字', 'error'); return; }

  const btn = document.getElementById('msgSendBtn');
  btn.disabled = true;
  btn.textContent = '发送中…';
  setMsgStatus('正在发送…');

  try {
    const res = await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        from_student_id: fromId,
        from_password: password,
        to_student_id: s.id,
        text
      })
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) {
      setMsgStatus('发送失败：' + (json.error || res.statusText), 'error');
      btn.disabled = false;
      btn.textContent = '发送';
      return;
    }
    setMsgStatus(json.updated ? '✓ 已更新（等待审核）' : '✓ 已提交（等待审核）', 'success');
    showUploadToast('💌 留言已发送');
    setTimeout(() => closeMessageSend(), 800);
  } catch (e) {
    setMsgStatus('网络错误：' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '发送';
  }
}

function toggleMessageOwnerView() {
  const btn = document.getElementById('msgOwnerBtn');
  if (!btn) return;
  const entering = !document.body.classList.contains('msg-owner');
  if (entering) {
    const pwd = prompt('请输入你的纪念册密码（解锁精选管理）');
    if (!pwd) return;
    /* 验证密码（通过尝试一次无副作用的 API 调用） */
    window._ownerPassword = pwd;
    document.body.classList.add('msg-owner');

    btn.style.color = '#fff';

  } else {
    document.body.classList.remove('msg-owner');
    window._ownerPassword = null;
    btn.textContent = '⭐ 精选管理（' + window._student.name + '）';

async function toggleFeatured(messageId, fromId) {
  if (!messageId) { alert('这条留言暂未同步到云端，无法精选'); return; }
