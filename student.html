async function deleteMessage(messageId) {
  if (!messageId) { alert('这条留言暂未同步到云端'); return; }
  const s = window._student;
  const pwd = window._ownerPassword;
  if (!pwd) { alert('请先解锁精选管理'); return; }
  if (!confirm('确定要删除这条留言吗？')) return;
  try {
    const res = await fetch(`/api/messages/${encodeURIComponent(messageId)}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: s.id, password: pwd })
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) { alert('删除失败：' + (json.error || res.statusText)); return; }
    showUploadToast('🗑️ 已删除');
    setTimeout(() => render(s, window._data), 600);
  } catch (e) {
    alert('网络错误：' + e.message);
  }
}

/* 拉取云端留言并合并到当前学生 */
async function fetchAndMergeMessages(s) {
  try {
    const res = await fetch(`/api/messages?to=${encodeURIComponent(s.id)}`);
    if (!res.ok) return;
    const json = await res.json();
    const apiMsgs = json.messages || [];
    if (!s.messages) s.messages = [];
    /* 用 from_student_id 做 key 合并 */
    const localByFrom = new Map();
    s.messages.forEach(m => {
      if (m.fromId) localByFrom.set(m.fromId, m);
    });
    apiMsgs.forEach(am => {
      const fromId = am.from_student_id;
      const local = localByFrom.get(fromId);
      if (local) {
        local.text = am.text;
        local.is_featured = !!am.is_featured;
        local.id = am.id;
      } else {
        s.messages.push({
          id: am.id,
          fromId,
          from: am.from_name,
          text: am.text,
          is_featured: !!am.is_featured
        });
      }
    });
    /* 持久化到 localStorage */
    try { localStorage.setItem('student-' + s.id, JSON.stringify(s)); } catch (e) {}
    /* 不重渲染（避免打断用户浏览） */
  } catch (e) { /* 静默失败 */ }
}

/* ═══════════════════════════════════════════════════════════
   CLASS PHOTO
   ═══════════════════════════════════════════════════════════ */
async function loadClassPhoto() {
  try {
    let classPhotoUrl = null;

    /* 1) 尝试 localStorage 缓存（1 天有效期） */
    try {
      const cached = JSON.parse(localStorage.getItem('class-config') || '{}');
      if (cached.class_photo_url && cached._cachedAt && (Date.now() - cached._cachedAt < 86400000)) {
        classPhotoUrl = cached.class_photo_url;
      }
    } catch (e) {}

    /* 2) 缓存失效时请求 API */
    if (!classPhotoUrl) {
      try {
        const res = await fetch('/api/class/config');
        if (res.ok) {
          const data = await res.json();
          (data.config || []).forEach(item => {
            if (item.key === 'class_photo_url' && item.value) {
              classPhotoUrl = item.value;
            }
          });
          /* 写缓存 */
          if (classPhotoUrl) {
            try {
              localStorage.setItem('class-config', JSON.stringify({ class_photo_url: classPhotoUrl, _cachedAt: Date.now() }));
            } catch (e) {}
          }
        }
      } catch (e) {}
    }

    if (!classPhotoUrl) return;

    /* 3) 注入徽章到 hero */
    const hero = document.querySelector('.hero-content');
    if (!hero) return;

    /* 避免重复 */
    if (hero.querySelector('.class-photo-badge')) return;

    const badge = document.createElement('div');
    badge.className = 'class-photo-badge';
    badge.innerHTML = '<img src="' + classPhotoUrl + '" alt="大合照" loading="lazy" /><span>点击查看大合照</span>';
    badge.onclick = () => openClassPhotoModal(classPhotoUrl);

    /* 插入到 hero-badge 后面 */
    const heroBadge = hero.querySelector('.hero-badge');
    if (heroBadge) {
      heroBadge.after(badge);
    } else {
      hero.querySelector('h1').after(badge);
    }

    /* 4) 追加模态框 */
    if (!document.getElementById('classPhotoModal')) {
      const modal = document.createElement('div');
      modal.id = 'classPhotoModal';
      modal.className = 'class-photo-modal';
      modal.innerHTML = '<button class="close-btn" onclick="closeClassPhotoModal()">×</button><img id="classPhotoModalImg" src="" alt="大合照" />';
      modal.onclick = (e) => { if (e.target === modal) closeClassPhotoModal(); };
      document.body.appendChild(modal);
    }
  } catch (e) {}
}

function openClassPhotoModal(url) {
  const modal = document.getElementById('classPhotoModal');
  const img = document.getElementById('classPhotoModalImg');
  if (modal && img) {
    img.src = url;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}

function closeClassPhotoModal() {
  const modal = document.getElementById('classPhotoModal');
  if (modal) {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }
}

/* 导出给 window */
Object.assign(window, { openClassPhotoModal, closeClassPhotoModal });
